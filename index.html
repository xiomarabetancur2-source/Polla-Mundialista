    table { width: 100%; border-collapse: collapse; }

      { id: 32, grupo: 'F', fecha: '14/06/2026', local: 'Suecia', visita: 'Túnez' },
      { id: 33, grupo: 'F', fecha: '20/06/2026', local: 'Países Bajos', visita: 'Suecia' },
      { id: 34, grupo: 'F', fecha: '20/06/2026', local: 'Túnez', visita: 'Japón' },
      { id: 35, grupo: 'F', fecha: '25/06/2026', local: 'Japón', visita: 'Suecia' },
      { id: 36, grupo: 'F', fecha: '25/06/2026', local: 'Túnez', visita: 'Países Bajos' }
    ];

    const CONFIG = { adminPass: 'admin2026', ptsExacto: 5, ptsGanador: 2 };
    let currentUser = null;
    let currentPage = 'dashboard';
    let equiposCache = [];

    // ==================== FUNCIONES SUPABASE ====================
    async function fetchAPI(table, method = 'GET', body = null) {
      const url = `${SUPABASE_URL}/rest/v1/${table}`;
      const headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json'
      };
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);
      const response = await fetch(url, options);
      return await response.json();
    }

    async function cargarEquipos() {
      const data = await fetchAPI('equipos');
      equiposCache = data;
      return equiposCache;
    }

    async function guardarPrediccionCloud(equipoId, partidoId, local, visita) {
      const existe = await fetchAPI(`predicciones?equipo_id=eq.${equipoId}&partido_id=eq.${partidoId}`);
      if (existe.length > 0) {
        await fetchAPI(`predicciones?equipo_id=eq.${equipoId}&partido_id=eq.${partidoId}`, 'PATCH', { local, visita });
      } else {
        await fetchAPI('predicciones', 'POST', { equipo_id: equipoId, partido_id: partidoId, local, visita });
      }
    }

    async function cargarPrediccionesEquipo(equipoId) {
      const data = await fetchAPI(`predicciones?equipo_id=eq.${equipoId}`);
      const preds = {};
      for (const p of data) preds[p.partido_id] = { local: p.local, visita: p.visita };
      return preds;
    }

    async function cargarResultados() {
      const data = await fetchAPI('resultados');
      const res = {};
      for (const r of data) res[r.partido_id] = { local: r.local, visita: r.visita };
      return res;
    }

    async function guardarResultadoCloud(partidoId, local, visita) {
      const existe = await fetchAPI(`resultados?partido_id=eq.${partidoId}`);
      if (existe.length > 0) {
        await fetchAPI(`resultados?partido_id=eq.${partidoId}`, 'PATCH', { local, visita });
      } else {
        await fetchAPI('resultados', 'POST', { partido_id: partidoId, local, visita });
      }
    }

    async function borrarResultadoCloud(partidoId) {
      await fetchAPI(`resultados?partido_id=eq.${partidoId}`, 'DELETE');
    }

    async function borrarTodosResultadosCloud() {
      const resultados = await cargarResultados();
      for (const partidoId of Object.keys(resultados)) {
        await fetchAPI(`resultados?partido_id=eq.${partidoId}`, 'DELETE');
      }
    }

    async function guardarEquipoCloud(id, nombre, pin, activo) {
      await fetchAPI(`equipos?id=eq.${id}`, 'PATCH', { nombre, pin, activo });
    }

    async function agregarEquipoCloud(nombre, pin) {
      await fetchAPI('equipos', 'POST', { nombre, pin, activo: true });
    }

    // ==================== CÁLCULO ====================
    function calcularPuntosPrediccion(predLocal, predVisit, resLocal, resVisit) {
      if (resLocal === undefined) return null;
      if (predLocal === resLocal && predVisit === resVisit) return CONFIG.ptsExacto;
      const predGanador = predLocal > predVisit ? 'L' : (predLocal < predVisit ? 'V' : 'E');
      const resGanador = resLocal > resVisit ? 'L' : (resLocal < resVisit ? 'V' : 'E');
      if (predGanador === resGanador) return CONFIG.ptsGanador;
      return 0;
    }

    async function calcularRanking() {
      const equipos = equiposCache.filter(e => e.activo);
      const resultados = await cargarResultados();
      const ranking = [];
      for (const equipo of equipos) {
        const preds = await cargarPrediccionesEquipo(equipo.id);
        let puntos = 0, exactos = 0;
        for (const partido of PARTIDOS) {
          const res = resultados[partido.id];
          const pred = preds[partido.id];
          if (res && pred) {
            const pts = calcularPuntosPrediccion(pred.local, pred.visita, res.local, res.visita);
            if (pts === 5) { puntos += pts; exactos++; }
            else if (pts === 2) puntos += pts;
          }
        }
        ranking.push({ ...equipo, puntos, exactos });
      }
      ranking.sort((a, b) => b.puntos - a.puntos || b.exactos - a.exactos);
      return ranking;
    }

    // ==================== RENDER ====================
    async function renderDashboard() {
      const ranking = await calcularRanking();
      const resultados = await cargarResultados();
      document.getElementById('rankingList').innerHTML = `<table><thead><tr><th>#</th><th>Equipo</th><th>Pts</th><th>🎯</th></tr></thead><tbody>${ranking.map((eq,i)=>`<tr><td>${i+1} ${i===0?'🏆':''}${i===1?'🥈':''}${i===2?'🥉':''}</td><td>${eq.nombre}</td><td class="rank-pts">${eq.puntos}</td><td>${eq.exactos}</td></tr>`).join('')}</tbody><table>`;
      const proximos = PARTIDOS.filter(p => !resultados[p.id]).slice(0,5);
      document.getElementById('proximosPartidos').innerHTML = proximos.map(p => `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">VS</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center">📅 ${p.fecha} · Grupo ${p.grupo}</div></div>`).join('') || '<div style="text-align:center;padding:20px">✅ Todos los partidos jugados</div>';
      const ultimos = PARTIDOS.filter(p => resultados[p.id]).slice(-5).reverse();
      document.getElementById('ultimosResultados').innerHTML = ultimos.map(p => `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">${resultados[p.id].local} - ${resultados[p.id].visita}</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center">📅 ${p.fecha}</div></div>`).join('') || '<div style="text-align:center;padding:20px">📋 Sin resultados aún</div>';
      const top = ranking[0] || { nombre: '-', puntos: 0, exactos: 0 };
      document.getElementById('statsGrid').innerHTML = `<div class="stat-card"><div class="value">${top.nombre}</div><div>🏆 Líder</div></div><div class="stat-card"><div class="value">${top.puntos}</div><div>Puntos</div></div><div class="stat-card"><div class="value">${top.exactos}</div><div>🎯 Exactos</div></div>`;
    }

    async function renderPredicciones() {
      if (!currentUser || currentUser.isAdmin) {
        document.getElementById('prediccionesList').innerHTML = '<div style="text-align:center;padding:20px">🔒 Inicia sesión para hacer tus predicciones</div>';
        return;
      }
      const misPreds = await cargarPrediccionesEquipo(currentUser.id);
      const resultados = await cargarResultados();
      const grupos = {};
      for (const p of PARTIDOS) { if (!grupos[p.grupo]) grupos[p.grupo] = []; grupos[p.grupo].push(p); }
      let html = '';
      for (const grupo of Object.keys(grupos).sort()) {
        html += `<div class="grupo-titulo">🏳️ Grupo ${grupo}</div>`;
        for (const p of grupos[grupo]) {
          const res = resultados[p.id];
          const pred = misPreds[p.id] || {};
          html += `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">VS</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center">📅 ${p.fecha} · Grupo ${p.grupo}</div>`;
          if (res) {
            const pts = calcularPuntosPrediccion(pred.local, pred.visita, res.local, res.visita);
            html += `<div class="pred-resultado">🔒 Partido finalizado<br>Tu predicción: ${pred.local || '?'} - ${pred.visita || '?'}<br><span style="color:#6c9ebf">${pts !== null ? pts + ' puntos' : ''}</span></div>`;
          } else if (pred.local !== undefined) {
            html += `<div class="pred-resultado">✅ Tu predicción guardada: <strong>${pred.local} - ${pred.visita}</strong></div>`;
          } else {
            html += `<div class="pred-inputs"><input type="number" id="predL_${p.id}" placeholder="0" min="0" max="20" onchange="guardarPrediccion(${p.id})"><span>-</span><input type="number" id="predV_${p.id}" placeholder="0" min="0" max="20" onchange="guardarPrediccion(${p.id})"></div>`;
          }
          html += `</div>`;
        }
      }
      document.getElementById('prediccionesList').innerHTML = html;
    }

    async function guardarPrediccion(partidoId) {
      if (!currentUser || currentUser.isAdmin) return;
      const local = document.getElementById(`predL_${partidoId}`).value;
      const visita = document.getElementById(`predV_${partidoId}`).value;
      if (local === '' || visita === '') { mostrarToast('❌ Ingresa ambos marcadores', 'error'); return; }
      await guardarPrediccionCloud(currentUser.id, partidoId, parseInt(local), parseInt(visita));
      mostrarToast('✅ Predicción guardada (todos verán este resultado)');
      renderPredicciones();
      renderDashboard();
    }

    // ==================== ADMIN ====================
    async function renderAdminEquipos() {
      const equipos = equiposCache;
      const html = `<div class="card"><div class="card-title">👥 Gestión de Equipos</div>${equipos.map(eq => `<div class="equipo-row"><input type="text" id="nombre_${eq.id}" value="${eq.nombre}" style="width:150px"><input type="password" id="pin_${eq.id}" value="${eq.pin}" style="width:80px"><span style="color:${eq.activo?'#6c9ebf':'#ff6b6b'}">${eq.activo?'✅ Activo':'❌ Inactivo'}</span><button class="btn btn-primary" onclick="guardarEquipo(${eq.id})">💾</button><button class="btn ${eq.activo?'btn-danger':'btn-success'}" onclick="toggleEquipo(${eq.id})">${eq.activo?'❌':'✅'}</button></div>`).join('')}<button class="btn btn-primary" style="margin-top:1rem" onclick="agregarEquipo()">+ Agregar Equipo</button></div>`;
      document.getElementById('adminEquipos').innerHTML = html;
    }

    async function renderAdminResultados() {
      const resultados = await cargarResultados();
      let html = `<div class="card"><div class="card-title">⚽ Registrar Resultados Reales</div><div style="margin-bottom:1rem"><button class="btn btn-danger" onclick="borrarTodosResultados()">🗑️ Borrar TODOS los resultados</button></div>`;
      for (const p of PARTIDOS) {
        const res = resultados[p.id] || {};
        html += `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local"><strong>${p.local}</strong></span><span class="vs">VS</span><span class="equipo-visita"><strong>${p.visita}</strong></span></div><div style="display:flex;justify-content:center;gap:0.5rem;margin-top:0.5rem;flex-wrap:wrap"><input type="number" id="resL_${p.id}" class="resultado-input" value="${res.local||''}" placeholder="0"><span>-</span><input type="number" id="resV_${p.id}" class="resultado-input" value="${res.visita||''}" placeholder="0"><button class="btn btn-primary" onclick="guardarResultado(${p.id})">💾 Guardar</button>${res.local!==undefined?`<button class="btn btn-danger" onclick="borrarResultado(${p.id})">🗑️</button>`:''}</div><div style="font-size:0.7rem;color:#888;text-align:center">📅 ${p.fecha} · Grupo ${p.grupo}</div></div>`;
      }
      html += `</div>`;
      document.getElementById('adminResultados').innerHTML = html;
    }

    async function guardarResultado(partidoId) {
      const local = document.getElementById(`resL_${partidoId}`).value;
      const visita = document.getElementById(`resV_${partidoId}`).value;
      if (local === '' || visita === '') { mostrarToast('❌ Ingresa ambos marcadores', 'error'); return; }
      await guardarResultadoCloud(partidoId, parseInt(local), parseInt(visita));
      mostrarToast('✅ Resultado guardado (todos lo verán)');
      renderAdminResultados();
      renderDashboard();
      if (currentUser && !currentUser.isAdmin) renderPredicciones();
    }

    async function borrarResultado(partidoId) {
      await borrarResultadoCloud(partidoId);
      mostrarToast('🗑️ Resultado eliminado');
      renderAdminResultados();
      renderDashboard();
    }

    async function borrarTodosResultados() {
      if (confirm('⚠️ ¿Estás seguro? Esto borrará TODOS los resultados.')) {
        await borrarTodosResultadosCloud();
        mostrarToast('🗑️ Todos los resultados eliminados');
        renderAdminResultados();
        renderDashboard();
      }
    }

    async function guardarEquipo(id) {
      const nombre = document.getElementById(`nombre_${id}`).value;
      const pin = document.getElementById(`pin_${id}`).value;
      await guardarEquipoCloud(id, nombre, pin, true);
      mostrarToast('✅ Equipo actualizado (todos lo verán)');
      await cargarEquipos();
      renderAdminEquipos();
      cargarEquiposLogin();
      renderDashboard();
    }

    async function toggleEquipo(id) {
      const equipo = equiposCache.find(e => e.id === id);
      if (equipo) {
        await guardarEquipoCloud(id, equipo.nombre, equipo.pin, !equipo.activo);
        mostrarToast(equipo.activo ? '✅ Equipo desactivado' : '✅ Equipo activado');
        await cargarEquipos();
        renderAdminEquipos();
        cargarEquiposLogin();
        renderDashboard();
      }
    }

    async function agregarEquipo() {
      const newId = Math.max(...equiposCache.map(e => e.id), 0) + 1;
      await agregarEquipoCloud(`Equipo ${newId}`, String(newId).padStart(4,'0'));
      mostrarToast('➕ Equipo agregado');
      await cargarEquipos();
      renderAdminEquipos();
      cargarEquiposLogin();
    }

    // ==================== ADMIN - ADHERENCIA, BONOS, PENALIZACIONES (simplificado) ====================
    function renderAdminAdherencia() { document.getElementById('adminAdherencia').innerHTML = '<div class="card"><div class="card-title">📋 Adherencia</div><p>Función en desarrollo</p></div>'; }
    function renderAdminBonos() { document.getElementById('adminBonos').innerHTML = '<div class="card"><div class="card-title">⭐ Bonos</div><p>Función en desarrollo</p></div>'; }
    function renderAdminPenalizaciones() { document.getElementById('adminPenalizaciones').innerHTML = '<div class="card"><div class="card-title">🚫 Penalizaciones</div><p>Función en desarrollo</p></div>'; }
    function renderAdminPrediccionesAdmin() { document.getElementById('adminPrediccionesAdmin').innerHTML = '<div class="card"><div class="card-title">👁️ Ver Predicciones</div><p>Función en desarrollo</p></div>'; }

    // ==================== NAVEGACIÓN ====================
    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.add('active');
      if (page === 'dashboard') renderDashboard();
      if (page === 'predicciones') renderPredicciones();
    }

    function showAdminTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      if (tab === 'equipos') {
        document.querySelector('.admin-tab[onclick*="equipos"]').classList.add('active');
        document.getElementById('adminEquipos').classList.add('active');
        renderAdminEquipos();
      } else if (tab === 'resultados') {
        document.querySelector('.admin-tab[onclick*="resultados"]').classList.add('active');
        document.getElementById('adminResultados').classList.add('active');
        renderAdminResultados();
      } else if (tab === 'adherencia') {
        document.querySelector('.admin-tab[onclick*="adherencia"]').classList.add('active');
        document.getElementById('adminAdherencia').classList.add('active');
        renderAdminAdherencia();
      } else if (tab === 'bonos') {
        document.querySelector('.admin-tab[onclick*="bonos"]').classList.add('active');
        document.getElementById('adminBonos').classList.add('active');
        renderAdminBonos();
      } else if (tab === 'penalizaciones') {
        document.querySelector('.admin-tab[onclick*="penalizaciones"]').classList.add('active');
        document.getElementById('adminPenalizaciones').classList.add('active');
        renderAdminPenalizaciones();
      } else if (tab === 'prediccionesAdmin') {
        document.querySelector('.admin-tab[onclick*="prediccionesAdmin"]').classList.add('active');
        document.getElementById('adminPrediccionesAdmin').classList.add('active');
        renderAdminPrediccionesAdmin();
      }
    }

    // ==================== AUTENTICACIÓN ====================
    async function doLogin() {
      const equipoId = parseInt(document.getElementById('loginEquipo').value);
      const pin = document.getElementById('loginPin').value;
      const equipo = equiposCache.find(e => e.id === equipoId && e.pin === pin && e.activo);
      if (!equipo) { document.getElementById('loginError').style.display = 'block'; return; }
      document.getElementById('loginError').style.display = 'none';
      currentUser = { id: equipo.id, nombre: equipo.nombre, isAdmin: false };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = `🟢 ${equipo.nombre}`;
      showPage('dashboard');
      actualizarMobileNav();
    }

    function doAdminLogin() {
      const pass = document.getElementById('adminPass').value;
      if (pass !== CONFIG.adminPass) { document.getElementById('adminError').style.display = 'block'; return; }
      document.getElementById('adminError').style.display = 'none';
      currentUser = { id: 0, nombre: 'Admin', isAdmin: true };
      document.getElementById('adminLoginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = '⚙️ Admin';
      document.getElementById('adminBtn').style.display = 'block';
      showPage('dashboard');
      actualizarMobileNav();
    }

    function logout() { currentUser = null; document.getElementById('app').style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('loginPin').value = ''; document.getElementById('adminBtn').style.display = 'none'; }
    function showAdminLogin() { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('adminLoginScreen').style.display = 'flex'; }
    function hideAdminLogin() { document.getElementById('adminLoginScreen').style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }
    function actualizarMobileNav() { const mobileNav = document.getElementById('mobileNav'); const pages = ['dashboard','predicciones']; if (currentUser?.isAdmin) pages.push('admin'); mobileNav.innerHTML = pages.map(p => `<button onclick="showPage('${p}')" class="${currentPage===p?'active':''}">${p==='dashboard'?'📊':p==='predicciones'?'🎯':'⚙️'}<br><span style="font-size:0.6rem">${p}</span></button>`).join(''); }
    async function cargarEquiposLogin() { const select = document.getElementById('loginEquipo'); select.innerHTML = '<option value="">-- Selecciona tu equipo --</option>' + equiposCache.filter(e=>e.activo).map(e=>`<option value="${e.id}">${e.nombre}</option>`).join(''); }
    function mostrarToast(mensaje, tipo='success') { const toast = document.createElement('div'); toast.className = `toast ${tipo==='error'?'error':''}`; toast.textContent = mensaje; document.body.appendChild(toast); setTimeout(()=>toast.remove(),3000); }

    window.guardarPrediccion = guardarPrediccion;
    window.guardarResultado = guardarResultado;
    window.borrarResultado = borrarResultado;
    window.borrarTodosResultados = borrarTodosResultados;
    window.guardarEquipo = guardarEquipo;
    window.toggleEquipo = toggleEquipo;
    window.agregarEquipo = agregarEquipo;
    window.showPage = showPage;
    window.showAdminTab = showAdminTab;
    window.doLogin = doLogin;
    window.doAdminLogin = doAdminLogin;
    window.showAdminLogin = showAdminLogin;
    window.hideAdminLogin = hideAdminLogin;
    window.logout = logout;

    // INICIO
    window.addEventListener('DOMContentLoaded', async () => {
      await cargarEquipos();
      await cargarEquiposLogin();
      setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        splash.classList.add('hide');
        setTimeout(() => { splash.style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }, 800);
      }, 2500);
    });
  </script>
</body>
</html>
