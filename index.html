    async function apiFetch(table, method = 'GET', body = null) {
      const url = `${SUPABASE_URL}/rest/v1/${table}`;
      const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };
      const options = { method, headers };
      if (body && (method === 'POST' || method === 'PATCH')) options.body = JSON.stringify(body);
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      if (method === 'DELETE') return true;
      return res.json();
    }

    // ==================== CÁLCULO DE PUNTOS ====================
    function calcularPuntosPrediccion(predLocal, predVisit, resLocal, resVisit) {
      if (resLocal === undefined || resVisit === undefined) return null;
      if (predLocal === resLocal && predVisit === resVisit) return CONFIG.ptsExacto;
      const predGanador = predLocal > predVisit ? 'L' : (predLocal < predVisit ? 'V' : 'E');
      const resGanador = resLocal > resVisit ? 'L' : (resLocal < resVisit ? 'V' : 'E');
      if (predGanador === resGanador) return CONFIG.ptsGanador;
      return 0;
    }

    function calcularTotalPuntos() {
      const ranking = [];
      for (const equipo of equiposCache) {
        if (!equipo.activo) continue;
        let puntosPrediccion = 0, exactos = 0;
        const predsEquipo = prediccionesCache[equipo.id] || {};
        for (const partido of PARTIDOS) {
          const resultado = resultadosCache[partido.id];
          const prediccion = predsEquipo[partido.id];
          if (resultado && prediccion && prediccion.local !== undefined && prediccion.visita !== undefined) {
            const pts = calcularPuntosPrediccion(prediccion.local, prediccion.visita, resultado.local, resultado.visita);
            if (pts !== null) {
              puntosPrediccion += pts;
              if (pts === CONFIG.ptsExacto) exactos++;
            }
          }
        }
        let puntosAdherencia = 0;
        const adhEquipo = adherenciaCache[equipo.id] || {};
        for (const fecha in adhEquipo) puntosAdherencia += adhEquipo[fecha];
        let puntosBonos = 0;
        for (const bono of bonosCache) if (bono.equipo_id === equipo.id) puntosBonos += bono.puntos;
        let puntosPenalizaciones = 0;
        for (const penal of penalizacionesCache) if (penal.equipo_id === equipo.id) puntosPenalizaciones += penal.puntos;
        const total = puntosPrediccion + puntosAdherencia + puntosBonos + puntosPenalizaciones;
        ranking.push({ ...equipo, puntosPrediccion, puntosAdherencia, puntosBonos, puntosPenalizaciones, total, exactos });
      }
      ranking.sort((a, b) => b.total - a.total || b.exactos - a.exactos || b.puntosAdherencia - a.puntosAdherencia);
      return ranking;
    }

      const ranking = calcularTotalPuntos();
      const rankingHTML = `<table><thead><tr><th>#</th><th>Equipo</th><th>Total</th><th>Pred</th><th>Adh</th><th>Bonus</th><th>Pen</th><th>🎯</th></tr></thead><tbody>${ranking.map((eq, i) => `<tr><td class="rank-pos"><strong>${i+1}</strong> ${i===0?'🏆':''}${i===1?'🥈':''}${i===2?'🥉':''}</td><td>${eq.nombre}</td><td class="rank-pts">${eq.total}</td><td>${eq.puntosPrediccion}</td><td>${eq.puntosAdherencia}</td><td>${eq.puntosBonos}</td><td>${eq.puntosPenalizaciones}</td><td>${eq.exactos}</td></tr>`).join('')}</tbody></table>`;
      document.getElementById('rankingList').innerHTML = rankingHTML;

      const proximos = PARTIDOS.filter(p => !resultadosCache[p.id]).slice(0,5);
      document.getElementById('proximosPartidos').innerHTML = proximos.map(p => `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">VS</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center;margin-top:5px">📅 ${p.fecha} · Grupo ${p.grupo}</div></div>`).join('') || '<div style="text-align:center;padding:20px">✅ ¡Todos los partidos jugados!</div>';

      document.getElementById('ultimosResultados').innerHTML = ultimos.map(p => `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">${resultadosCache[p.id].local} - ${resultadosCache[p.id].visita}</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center;margin-top:5px">📅 ${p.fecha}</div></div>`).join('') || '<div style="text-align:center;padding:20px">📋 Sin resultados aún</div>';

    }

    async function borrarPrediccionesEquipo(equipoId) {
      if (confirm(`⚠️ ¿Estás seguro? Esto borrará TODAS las predicciones de ${equiposCache.find(e=>e.id===equipoId)?.nombre}.`)) {
        const preds = await apiFetch(`predicciones?equipo_id=eq.${equipoId}`);
        for (const p of preds) { await apiFetch(`predicciones?id=eq.${p.id}`, 'DELETE'); }
        delete prediccionesCache[equipoId];
        mostrarToast(`🗑️ Predicciones eliminadas`);
        renderAdminPrediccionesAdmin();
        if (currentUser && currentUser.id === equipoId) renderPredicciones();
        renderDashboard();
      }
    }

    // ==================== NAVEGACIÓN ====================
    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
      if (page === 'dashboard') renderDashboard();
      if (page === 'predicciones') renderPredicciones();
      if (page === 'admin' && currentUser?.isAdmin) showAdminTab('equipos');
    }

    function showAdminTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      const panels = { equipos: renderAdminEquipos, resultados: renderAdminResultados, adherencia: renderAdminAdherencia, bonos: renderAdminBonos, penalizaciones: renderAdminPenalizaciones, prediccionesAdmin: renderAdminPrediccionesAdmin };
      if (panels[tab]) { panels[tab](); document.getElementById(`admin${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active'); }
    }

    // ==================== AUTENTICACIÓN ====================
    async function doLogin() {
      const equipoId = parseInt(document.getElementById('loginEquipo').value);
      const pin = document.getElementById('loginPin').value;
      const equipo = equiposCache.find(e => e.id === equipoId && e.pin === pin && e.activo);
      if (!equipo) { document.getElementById('loginError').style.display = 'block'; return; }
      document.getElementById('loginError').style.display = 'none';
      currentUser = { id: equipo.id, nombre: equipo.nombre, isAdmin: false };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = `🟢 ${equipo.nombre}`;
      showPage('dashboard');
      actualizarMobileNav();
    }

    function doAdminLogin() {
      const pass = document.getElementById('adminPass').value;
      if (pass !== CONFIG.adminPass) { document.getElementById('adminError').style.display = 'block'; return; }
      document.getElementById('adminError').style.display = 'none';
      currentUser = { id: 0, nombre: 'Admin', isAdmin: true };
      document.getElementById('adminLoginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = '⚙️ Admin';
      document.getElementById('adminBtn').style.display = 'block';
      showPage('dashboard');
      actualizarMobileNav();
    }

    function logout() { currentUser = null; document.getElementById('app').style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; document.getElementById('loginPin').value = ''; document.getElementById('adminBtn').style.display = 'none'; }
    function showAdminLogin() { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('adminLoginScreen').style.display = 'flex'; }
    function hideAdminLogin() { document.getElementById('adminLoginScreen').style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }
    function actualizarMobileNav() { const mobileNav = document.getElementById('mobileNav'); const pages = ['dashboard','predicciones']; if(currentUser?.isAdmin) pages.push('admin'); mobileNav.innerHTML = pages.map(p => `<button onclick="showPage('${p}')" class="${currentPage===p?'active':''}">${p==='dashboard'?'📊':p==='predicciones'?'🎯':'⚙️'}<br><span style="font-size:0.6rem">${p}</span></button>`).join(''); }
    async function cargarEquiposLogin() { const select = document.getElementById('loginEquipo'); select.innerHTML = '<option value="">-- Selecciona tu equipo --</option>' + equiposCache.filter(e=>e.activo).map(e=>`<option value="${e.id}">${e.nombre}</option>`).join(''); }
    function mostrarToast(mensaje, tipo='success') { const toast = document.createElement('div'); toast.className = `toast ${tipo==='error'?'error':''}`; toast.textContent = mensaje; document.body.appendChild(toast); setTimeout(()=>toast.remove(),3000); }

    // ==================== EXPORTAR GLOBALES ====================
    window.guardarPrediccion = guardarPrediccion;
    window.guardarResultado = guardarResultado;
    window.borrarResultado = borrarResultado;
    window.borrarTodosResultados = borrarTodosResultados;
    window.guardarEquipo = guardarEquipo;
    window.toggleEquipo = toggleEquipo;
    window.agregarEquipo = agregarEquipo;
    window.setAdherencia = setAdherencia;
    window.cargarAdherenciaDia = cargarAdherenciaDia;
    window.agregarBono = agregarBono;
    window.eliminarBono = eliminarBono;
    window.agregarPenalizacion = agregarPenalizacion;
    window.eliminarPenalizacion = eliminarPenalizacion;
    window.borrarPrediccionesEquipo = borrarPrediccionesEquipo;
    window.showPage = showPage;
    window.showAdminTab = showAdminTab;
    window.doLogin = doLogin;
    window.doAdminLogin = doAdminLogin;
    window.showAdminLogin = showAdminLogin;
    window.hideAdminLogin = hideAdminLogin;
    window.logout = logout;

    // ==================== INICIALIZACIÓN ====================
    window.addEventListener('DOMContentLoaded', async () => {
      await cargarTodosLosDatos();
      await cargarEquiposLogin();
      setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        splash.classList.add('hide');
        setTimeout(() => { splash.style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }, 800);
      }, 2500);
    });
  </script>
</body>
</html>
