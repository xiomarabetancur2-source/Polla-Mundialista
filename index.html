    async function apiFetch(table, method = 'GET', body = null) {

      const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' };

      const res = await fetch(url, options);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      if (method === 'DELETE') return true;
      return res.json();

      if (predLocal === resLocal && predVisit === resVisit) return 5;
      const predGanador = predLocal > predVisit ? 'L' : (predLocal < predVisit ? 'V' : 'E');
      const resGanador = resLocal > resVisit ? 'L' : (resLocal < resVisit ? 'V' : 'E');
      return predGanador === resGanador ? 2 : 0;

            else if (pts === 2) puntosPred += pts;
          }
        }
        let puntosAdh = 0;
        const adhEq = adherencia[equipo.id] || {};
        for (const f in adhEq) puntosAdh += adhEq[f];
        const puntosBonos = bonos.filter(b => b.equipo_id === equipo.id).reduce((a,b) => a + b.puntos, 0);
        const puntosPen = penalizaciones.filter(p => p.equipo_id === equipo.id).reduce((a,b) => a + b.puntos, 0);
        const total = puntosPred + puntosAdh + puntosBonos + puntosPen;
        ranking.push({ id: equipo.id, nombre: equipo.nombre, puntos: total, exactos, puntosPred, puntosAdh, puntosBonos, puntosPen });
      }
      ranking.sort((a, b) => b.puntos - a.puntos || b.exactos - a.exactos);
      return ranking;
    }

    async function renderDashboard() {
      const ranking = await calcularRanking();
      const resultados = await cargarResultados();
      let html = '<table><thead><tr><th>#</th><th>Equipo</th><th>Total</th><th>Pred</th><th>Adh</th><th>Bonus</th><th>Pen</th><th>🎯</th></tr></thead><tbody>';
      for (let i = 0; i < ranking.length; i++) {
        const eq = ranking[i];
        html += `<tr><td>${i+1} ${i===0?'🏆':''}${i===1?'🥈':''}${i===2?'🥉':''}</td><td>${eq.nombre}</td><td class="rank-pts">${eq.puntos}</td><td>${eq.puntosPred}</td><td>${eq.puntosAdh}</td><td>${eq.puntosBonos}</td><td>${eq.puntosPen}</td><td>${eq.exactos}</td></tr>`;
      }
      if (ranking.length === 0) html += '<tr><td colspan="8">Sin datos. Agrega resultados desde Admin</td></tr>';
      html += '</tbody><table>';
      document.getElementById('rankingList').innerHTML = html;

      const proximos = PARTIDOS.filter(p => !resultados[p.id]).slice(0,5);
      document.getElementById('proximosPartidos').innerHTML = proximos.map(p => `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">VS</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center">📅 ${p.fecha} · Grupo ${p.grupo}</div></div>`).join('') || '<div style="text-align:center;padding:20px">✅ Todos jugados</div>';

      const ultimos = PARTIDOS.filter(p => resultados[p.id]).slice(-5).reverse();
      document.getElementById('ultimosResultados').innerHTML = ultimos.map(p => `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">${resultados[p.id].local} - ${resultados[p.id].visita}</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center">📅 ${p.fecha}</div></div>`).join('') || '<div style="text-align:center;padding:20px">📋 Sin resultados</div>';

      const top = ranking[0] || { nombre: '-', puntos: 0, exactos: 0 };
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="value">${top.nombre}</div><div>🏆 Líder</div></div>
        <div class="stat-card"><div class="value">${top.puntos}</div><div>Puntos</div></div>
        <div class="stat-card"><div class="value">${top.exactos}</div><div>🎯 Exactos</div></div>
        <div class="stat-card"><div class="value">${Object.keys(resultados).length}</div><div>Jugados</div></div>
      `;
    }

    async function renderPredicciones() {
      if (!currentUser || currentUser.isAdmin) {
        document.getElementById('prediccionesList').innerHTML = '<div style="text-align:center;padding:20px">🔒 Inicia sesión</div>';
        return;
      }
      const misPreds = await cargarPrediccionesEquipo(currentUser.id);
      const resultados = await cargarResultados();
      const grupos = {};
      for (const p of PARTIDOS) { if (!grupos[p.grupo]) grupos[p.grupo] = []; grupos[p.grupo].push(p); }
      let html = '';
      for (const grupo of Object.keys(grupos).sort()) {
        html += `<div class="grupo-titulo">🏳️ Grupo ${grupo}</div>`;
        for (const p of grupos[grupo]) {
          const res = resultados[p.id];
          const pred = misPreds[p.id] || {};
          html += `<div class="partido-item"><div class="partido-equipos"><span class="equipo-local">${p.local}</span><span class="vs">VS</span><span class="equipo-visita">${p.visita}</span></div><div style="font-size:0.7rem;color:#888;text-align:center">📅 ${p.fecha} · Grupo ${p.grupo}</div>`;
          if (res) {
            const pts = calcularPuntos(pred.local, pred.visita, res.local, res.visita);
            html += `<div class="pred-resultado">🔒 ${pred.local||'?'} - ${pred.visita||'?'} (${pts} pts)</div>`;
          } else if (pred.local !== undefined) {
            html += `<div class="pred-resultado">✅ ${pred.local} - ${pred.visita}</div>`;
          } else {
            html += `<div class="pred-inputs"><input type="number" id="predL_${p.id}" placeholder="0" onchange="guardarPrediccion(${p.id})"><span>-</span><input type="number" id="predV_${p.id}" placeholder="0" onchange="guardarPrediccion(${p.id})"></div>`;
          }
          html += `</div>`;
        }
      }
      document.getElementById('prediccionesList').innerHTML = html;
    }

    async function guardarPrediccion(partidoId) {
      if (!currentUser || currentUser.isAdmin) return;
      const local = document.getElementById(`predL_${partidoId}`).value;
      const visita = document.getElementById(`predV_${partidoId}`).value;
      if (local === '' || visita === '') { mostrarToast('❌ Ingresa ambos', 'error'); return; }
      await guardarPrediccionCloud(currentUser.id, partidoId, parseInt(local), parseInt(visita));
      mostrarToast('✅ Guardado (todos lo ven)');
      renderPredicciones();
      renderDashboard();
    }

    // ADMIN EQUIPOS
    async function renderAdminEquipos() {
      let html = `<div class="card"><div class="card-title">👥 Equipos</div>`;
      for (const eq of equiposCache) {
        html += `<div class="equipo-row">
          <input type="text" id="nom_${eq.id}" value="${eq.nombre}" style="width:150px">
          <input type="password" id="pin_${eq.id}" value="${eq.pin}" style="width:80px">
          <span>${eq.activo?'✅ Activo':'❌ Inactivo'}</span>
          <button class="btn btn-primary" onclick="guardarEquipo(${eq.id})">💾</button>
          <button class="btn ${eq.activo?'btn-danger':'btn-success'}" onclick="toggleEquipo(${eq.id})">${eq.activo?'❌':'✅'}</button>
        </div>`;
      }
      html += `<button class="btn btn-primary" onclick="agregarEquipo()">+ Agregar</button></div>`;
      document.getElementById('adminEquipos').innerHTML = html;
    }

    async function guardarEquipo(id) {
      const nombre = document.getElementById(`nom_${id}`).value;
      const pin = document.getElementById(`pin_${id}`).value;
      await guardarEquipoCloud(id, nombre, pin, true);
      mostrarToast('✅ Equipo actualizado');
      await cargarEquipos();
      renderAdminEquipos();
      cargarEquiposLogin();
      renderDashboard();
    }

    async function toggleEquipo(id) {
      const equipo = equiposCache.find(e => e.id === id);
      if (equipo) {
        await guardarEquipoCloud(id, equipo.nombre, equipo.pin, !equipo.activo);
        mostrarToast(equipo.activo ? '❌ Desactivado' : '✅ Activado');
        await cargarEquipos();
        renderAdminEquipos();
        cargarEquiposLogin();
        renderDashboard();
      }
    }

    async function agregarEquipo() {
      const newId = Math.max(...equiposCache.map(e => e.id), 0) + 1;
      await agregarEquipoCloud(`Equipo ${newId}`, String(newId).padStart(4,'0'));
      mostrarToast('➕ Equipo agregado');
      await cargarEquipos();
      renderAdminEquipos();
      cargarEquiposLogin();
    }

    // ADMIN RESULTADOS
    async function renderAdminResultados() {
      const resultados = await cargarResultados();
      let html = `<div class="card"><div class="card-title">⚽ Resultados</div><div style="margin-bottom:1rem"><button class="btn btn-danger" onclick="borrarTodosResultados()">🗑️ Borrar TODOS</button></div>`;
      for (const p of PARTIDOS) {
        const res = resultados[p.id] || {};
        html += `<div class="partido-item"><div><strong>${p.local} vs ${p.visita}</strong> (${p.fecha})</div><div style="display:flex;gap:0.5rem;margin-top:0.5rem"><input type="number" id="resL_${p.id}" value="${res.local||''}" style="width:50px"><span>-</span><input type="number" id="resV_${p.id}" value="${res.visita||''}" style="width:50px"><button class="btn btn-primary" onclick="guardarResultado(${p.id})">Guardar</button>${res.local!==undefined?`<button class="btn btn-danger" onclick="borrarResultado(${p.id})">🗑️</button>`:''}</div></div>`;
      }
      html += `</div>`;
      document.getElementById('adminResultados').innerHTML = html;
    }

    async function guardarResultado(partidoId) {
      const local = document.getElementById(`resL_${partidoId}`).value;
      const visita = document.getElementById(`resV_${partidoId}`).value;
      if (local === '' || visita === '') { mostrarToast('❌ Ingresa ambos', 'error'); return; }
      await guardarResultadoCloud(partidoId, parseInt(local), parseInt(visita));
      mostrarToast('✅ Resultado guardado');
      renderAdminResultados();
      renderDashboard();
      if (currentUser && !currentUser.isAdmin) renderPredicciones();
    }

    async function borrarResultado(partidoId) {
      await borrarResultadoCloud(partidoId);
      mostrarToast('🗑️ Eliminado');
      renderAdminResultados();
      renderDashboard();
    }

    async function borrarTodosResultados() {
      if (confirm('¿Borrar TODOS los resultados?')) {
        await borrarTodosResultadosCloud();
        mostrarToast('🗑️ Todos eliminados');
        renderAdminResultados();
        renderDashboard();
      }
    }

    // ADMIN ADHERENCIA
    async function renderAdminAdherencia() {
      const hoy = new Date().toISOString().split('T')[0];
      const fechas = [];
      for (let i = 0; i < 30; i++) { const f = new Date(); f.setDate(f.getDate() - i); fechas.push(f.toISOString().split('T')[0]); }
      let html = `<div class="card"><div class="card-title">📋 Adherencia Diaria</div><div style="margin-bottom:1rem"><label>Fecha: </label><select id="adhFechaSelect" onchange="cargarAdherenciaDia()">${fechas.map(f => `<option value="${f}" ${f===hoy?'selected':''}>${f}</option>`).join('')}</select></div><div id="adherenciaDia"></div></div>`;
      document.getElementById('adminAdherencia').innerHTML = html;
      await cargarAdherenciaDia();
    }

    async function cargarAdherenciaDia() {
      const fecha = document.getElementById('adhFechaSelect').value;
      const adherencia = await cargarAdherencia();
      let html = `<div class="adherencia-grid">`;
      for (const eq of equiposCache) {
        if (!eq.activo) continue;
        const valorActual = (adherencia[eq.id] && adherencia[eq.id][fecha]) || null;
        html += `<div class="adh-equipo"><span><strong>${eq.nombre}</strong></span><div class="adh-btns">
          <button class="adh-btn ${valorActual===5?'selected':''}" onclick="setAdherencia(${eq.id},'${fecha}',5)">✅ Todos (+5)</button>
          <button class="adh-btn ${valorActual===3?'selected':''}" onclick="setAdherencia(${eq.id},'${fecha}',3)">⚠️ 1 incumple (+3)</button>
          <button class="adh-btn ${valorActual===1?'selected':''}" onclick="setAdherencia(${eq.id},'${fecha}',1)">⚠️⚠️ 2 incumplen (+1)</button>
          <button class="adh-btn ${valorActual===0?'selected':''}" onclick="setAdherencia(${eq.id},'${fecha}',0)">❌ Más de 2 (0)</button>
        </div></div>`;
      }
      html += `</div>`;
      document.getElementById('adherenciaDia').innerHTML = html;
    }

    async function setAdherencia(equipoId, fecha, puntos) {
      await guardarAdherenciaCloud(equipoId, fecha, puntos);
      mostrarToast(`✅ Adherencia: +${puntos} puntos`);
      await cargarAdherenciaDia();
      renderDashboard();
    }

    // ADMIN BONOS
    async function renderAdminBonos() {
      const bonos = await cargarBonos();
      let html = `<div class="card"><div class="card-title">⭐ Bonificaciones</div><div class="bono-row">
        <select id="bonoEquipo">${equiposCache.filter(e=>e.activo).map(e=>`<option value="${e.id}">${e.nombre}</option>`).join('')}</select>
        <input type="number" id="bonoPuntos" placeholder="Puntos" style="width:80px" value="10">
        <input type="text" id="bonoDescripcion" placeholder="Descripción" style="width:150px">
        <button class="btn btn-primary" onclick="agregarBono()">+ Agregar Bono</button>
      </div><div style="margin-top:1rem"><h4>Bonos registrados</h4>`;
      for (const b of bonos) {
        const eq = equiposCache.find(e => e.id === b.equipo_id);
        html += `<div class="equipo-row">⭐ ${eq?.nombre}: +${b.puntos} pts - ${b.descripcion} (${b.fecha}) <button class="btn btn-danger btn-sm" onclick="eliminarBono(${b.id})">🗑️</button></div>`;
      }
      if (bonos.length === 0) html += '<div style="color:#888">No hay bonos</div>';
      html += `</div></div>`;
      document.getElementById('adminBonos').innerHTML = html;
    }

    async function agregarBono() {
      const equipoId = parseInt(document.getElementById('bonoEquipo').value);
      const puntos = parseInt(document.getElementById('bonoPuntos').value);
      const descripcion = document.getElementById('bonoDescripcion').value || 'Bono';
      await guardarBonoCloud(equipoId, puntos, descripcion);
      mostrarToast(`⭐ Bono +${puntos} puntos`);
      renderAdminBonos();
      renderDashboard();
    }

    async function eliminarBono(id) {
      await eliminarBonoCloud(id);
      mostrarToast('🗑️ Bono eliminado');
      renderAdminBonos();
      renderDashboard();
    }

    // ADMIN PENALIZACIONES
    async function renderAdminPenalizaciones() {
      const penalizaciones = await cargarPenalizaciones();
      let html = `<div class="card"><div class="card-title">🚫 Penalizaciones</div><div class="bono-row">
        <select id="penEquipo">${equiposCache.filter(e=>e.activo).map(e=>`<option value="${e.id}">${e.nombre}</option>`).join('')}</select>
        <input type="number" id="penPuntos" placeholder="Puntos" style="width:80px" value="-5">
        <input type="text" id="penDescripcion" placeholder="Descripción" style="width:150px">
        <button class="btn btn-danger" onclick="agregarPenalizacion()">- Aplicar</button>
      </div><div style="margin-top:1rem"><h4>Penalizaciones</h4>`;
      for (const p of penalizaciones) {
        const eq = equiposCache.find(e => e.id === p.equipo_id);
        html += `<div class="equipo-row">⚠️ ${eq?.nombre}: ${p.puntos} pts - ${p.descripcion} (${p.fecha}) <button class="btn btn-danger btn-sm" onclick="eliminarPenalizacion(${p.id})">🗑️</button></div>`;
      }
      if (penalizaciones.length === 0) html += '<div style="color:#888">No hay penalizaciones</div>';
      html += `</div></div>`;
      document.getElementById('adminPenalizaciones').innerHTML = html;
    }

    async function agregarPenalizacion() {
      const equipoId = parseInt(document.getElementById('penEquipo').value);
      const puntos = parseInt(document.getElementById('penPuntos').value);
      const descripcion = document.getElementById('penDescripcion').value || 'Penalización';
      await guardarPenalizacionCloud(equipoId, puntos, descripcion);
      mostrarToast(`🚫 Penalización ${puntos} puntos`);
      renderAdminPenalizaciones();
      renderDashboard();
    }

    async function eliminarPenalizacion(id) {
      await eliminarPenalizacionCloud(id);
      mostrarToast('🗑️ Penalización eliminada');
      renderAdminPenalizaciones();
      renderDashboard();
    }

    // ADMIN VER PREDICCIONES
    async function renderAdminPrediccionesAdmin() {
      let html = `<div class="card"><div class="card-title">👁️ Ver Predicciones</div>`;
      for (const eq of equiposCache) {
        const preds = await cargarPrediccionesEquipo(eq.id);
        html += `<div class="partido-item"><strong>${eq.nombre}</strong> - ${Object.keys(preds).length} predicciones<br>`;
        for (const [pid, pred] of Object.entries(preds)) {
          const p = PARTIDOS.find(p => p.id == pid);
          if (p) html += `<span style="font-size:0.7rem;color:#888">${p.local} ${pred.local}-${pred.visita} ${p.visita}</span><br>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
      document.getElementById('adminPrediccionesAdmin').innerHTML = html;
    }

    // NAVEGACION
    function showPage(page) {
      currentPage = page;
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page${page.charAt(0).toUpperCase() + page.slice(1)}`).classList.add('active');
      if (page === 'dashboard') renderDashboard();
      if (page === 'predicciones') renderPredicciones();
    }

    function showAdminTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
      const panels = { equipos: renderAdminEquipos, resultados: renderAdminResultados, adherencia: renderAdminAdherencia, bonos: renderAdminBonos, penalizaciones: renderAdminPenalizaciones, prediccionesAdmin: renderAdminPrediccionesAdmin };
      if (panels[tab]) { panels[tab](); document.getElementById(`admin${tab.charAt(0).toUpperCase() + tab.slice(1)}`).classList.add('active'); }
    }

    async function doLogin() {
      const equipoId = parseInt(document.getElementById('loginEquipo').value);
      const pin = document.getElementById('loginPin').value;
      const equipo = equiposCache.find(e => e.id === equipoId && e.pin === pin && e.activo);
      if (!equipo) { document.getElementById('loginError').style.display = 'block'; return; }
      document.getElementById('loginError').style.display = 'none';
      currentUser = { id: equipo.id, nombre: equipo.nombre, isAdmin: false };
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = `🟢 ${equipo.nombre}`;
      showPage('dashboard');
      actualizarMobileNav();
    }

    function doAdminLogin() {
      const pass = document.getElementById('adminPass').value;
      if (pass !== 'admin2026') { document.getElementById('adminError').style.display = 'block'; return; }
      document.getElementById('adminError').style.display = 'none';
      currentUser = { id: 0, nombre: 'Admin', isAdmin: true };
      document.getElementById('adminLoginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('userBadge').textContent = '⚙️ Admin';
      document.getElementById('adminBtn').style.display = 'block';
      showPage('dashboard');
      actualizarMobileNav();
    }

    function logout() { currentUser = null; document.getElementById('app').style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }
    function showAdminLogin() { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('adminLoginScreen').style.display = 'flex'; }
    function hideAdminLogin() { document.getElementById('adminLoginScreen').style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }
    function actualizarMobileNav() { const mobileNav = document.getElementById('mobileNav'); const pages = ['dashboard','predicciones']; if(currentUser?.isAdmin) pages.push('admin'); mobileNav.innerHTML = pages.map(p => `<button onclick="showPage('${p}')" class="${currentPage===p?'active':''}">${p==='dashboard'?'📊':p==='predicciones'?'🎯':'⚙️'}<br>${p}</button>`).join(''); }
    async function cargarEquiposLogin() { const select = document.getElementById('loginEquipo'); select.innerHTML = '<option value="">-- Selecciona --</option>' + equiposCache.filter(e=>e.activo).map(e=>`<option value="${e.id}">${e.nombre}</option>`).join(''); }
    function mostrarToast(m, t='success') { const toast = document.createElement('div'); toast.className = `toast ${t==='error'?'error':''}`; toast.textContent = m; document.body.appendChild(toast); setTimeout(()=>toast.remove(),3000); }

    // GLOBALES
    window.guardarPrediccion = guardarPrediccion;
    window.guardarResultado = guardarResultado;
    window.borrarResultado = borrarResultado;
    window.borrarTodosResultados = borrarTodosResultados;
    window.guardarEquipo = guardarEquipo;
    window.toggleEquipo = toggleEquipo;
    window.agregarEquipo = agregarEquipo;
    window.setAdherencia = setAdherencia;
    window.cargarAdherenciaDia = cargarAdherenciaDia;
    window.agregarBono = agregarBono;
    window.eliminarBono = eliminarBono;
    window.agregarPenalizacion = agregarPenalizacion;
    window.eliminarPenalizacion = eliminarPenalizacion;
    window.showPage = showPage;
    window.showAdminTab = showAdminTab;
    window.doLogin = doLogin;
    window.doAdminLogin = doAdminLogin;
    window.showAdminLogin = showAdminLogin;
    window.hideAdminLogin = hideAdminLogin;
    window.logout = logout;

    window.addEventListener('DOMContentLoaded', async () => {
      await cargarEquipos();
      await cargarEquiposLogin();
      setTimeout(() => {
        const splash = document.getElementById('splashScreen');
        splash.classList.add('hide');
        setTimeout(() => { splash.style.display = 'none'; document.getElementById('loginScreen').style.display = 'flex'; }, 800);
      }, 2500);
    });
  </script>
</body>
</html>
